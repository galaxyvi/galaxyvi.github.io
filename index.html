<html>
<head>
  <meta name="viewport" content="width=device-width">
  <title>MDbaidu</title>
  <link rel="stylesheet" href="css/mdui.min.css"/> 
  <script src="js/mdui.min.js"></script>
  <script src="js/jquery.js"></script>
  <script src="js/jquery.min.js"></script>
  <script src="js/jquery.cookie.min.js"></script>
</head>
<body class="mdui-drawer-body-left mdui-theme-layout-light" >
<script>
$(document).ready(function test(){
   if($.cookie('darkmode')=='true')
   {
      $("body").removeClass("mdui-theme-layout-light");
      $("body").addClass("mdui-theme-layout-dark");
   }
   else
   {
      $("body").removeClass("mdui-theme-layout-dark");
      $("body").addClass("mdui-theme-layout-light");
   }
});
</script>
<div class="mdui-toolbar mdui-text-color-theme">
  <button id="toggle" class="mdui-btn mdui-btn-icon"><i class="mdui-icon material-icons">menu</i></button>
  <span class="mdui-typo-title mdui-ripple mdui-ripple-white">MDUI × Baidu</span>
  <div class="mdui-toolbar-spacer"></div>
  <button id="open" class="mdui-btn mdui-text-color-theme mdui-m-a-1"></button>
  <button id="close" class="mdui-btn mdui-text-color-theme mdui-m-a-1"></button>
</div>
<div class="mdui-drawer mdui-appbar-inset mdui-text-color-theme" id="drawer">
  <ul class="mdui-list">
    <a class="mdui-list-item mdui-ripple">
      <i class="mdui-list-item-icon mdui-icon material-icons">account_circle</i>
      <div class="mdui-list-item-content"><h2>Welcome</h2></div>
    </a>
    <a href="index.html" class="mdui-list-item mdui-ripple mdui-text-color-theme mdui-list-item-active">
      <i class="mdui-list-item-icon mdui-icon material-icons">home</i>
      <div class="mdui-list-item-content">Home</div>
    </a>
   <a href="about.html" class="mdui-list-item mdui-ripple">
      <i class="mdui-list-item-icon mdui-icon material-icons">question_answer</i>
      <div class="mdui-list-item-content">About</div>
    </a>
  </ul>
</div>
<script>
   var inst = new mdui.Drawer('#drawer');
   document.getElementById('open').addEventListener('click', function () {
     inst.open();
   });
   document.getElementById('close').addEventListener('click', function () {
        inst.close();
   });
   document.getElementById('toggle').addEventListener('click', function () {
     inst.toggle();
   })
   document.getElementById('getState').addEventListener('click', function () {
     mdui.alert(inst.getState());
   });
   var drawer = document.getElementById('drawer');
   drawer.addEventListener('open.mdui.drawer', function () {
     console.log('open');
   });
   drawer.addEventListener('opened.mdui.drawer', function () {
    console.log('opened');
   });
   drawer.addEventListener('close.mdui.drawer', function () {
        console.log('close');
   });
   drawer.addEventListener('closed.mdui.drawer', function () {
     console.log('closed');
   });
</script>
<div class="mdui-container mdui-color-theme">
  <div class="mdui-textfield">
    <i class="mdui-icon material-icons">&#xe8b6;</i>
    <input class="mdui-textfield-input" type="text" id="inputer"/></input>
  </div>
</div>
<div style="text-align:center">
<a onclick="baidugo()" class="mdui-btn mdui-btn-raised mdui-ripple mdui-ripple-white">GO</a>
<p>　</p>
<p>　</p>
<iframe id="res" src="" marginheight="1px" frameborder="0" width="700px" height="2500px"></iframe>
<script type="text/javascript">
{
   document.onkeydown =keyboard; 
   function keyboard(){ 
       if(event.keyCode ==13){
        baidugo();
    }
   }
}
</script>
<script type="text/javascript">
function baidugo()
{
  var url;
  var now;
  url='https://www.baidu.com/s?tn=baidulocal&ie=UTF-8&wd=' + document.getElementById("inputer").value;
  $(document).ready(function(){
      $("#res").attr("src", url);
      now=$('#suolue').attr('src');
   });
}
</script>
</div>
<script>
function clickmode(){
$(document).ready(function test(){
      if($.cookie('darkmode')=='false')
      {
         $("body").removeClass("mdui-theme-layout-light");
         $("body").addClass("mdui-theme-layout-dark");
         $.cookie('darkmode', 'true');
      }
      else
      {
         $("body").removeClass("mdui-theme-layout-dark");
         $("body").addClass("mdui-theme-layout-light");
         $.cookie('darkmode', 'false');
      }
});
}
</script>
</body>
