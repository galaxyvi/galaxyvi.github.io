<!doctype html>
<html> 
    <head> 
        <meta charset="UTF-8"> 
        <meta name="viewport" id="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"> 
        <link rel="icon" href="images/atri-2.png" type="image/x-icon"> 
        <link rel="stylesheet" href="mdui/css/mdui.min.css">
        <script src="mdui/js/mdui.min.js"></script>
        <style>
        .mdui-btn-raised{
        border-radius: 5px;
        }
        .mdui-dialog{
        border-radius: 10px;
        }
        .mdui-menu{
        border-radius: 10px;
        }
        .mdui-tooltip{
        border-radius: 20px;
        background-color: #EEEEEE;
        color:black;
        }
        @keyframes card{
        from {top: 64px;opacity: 0;}
        to {top: 0px;opacity: 1;}
        }
        .mdui-card{
        border-radius: 10px;
        animation-name: card;
        animation-duration: 1s;
        }
        .mdui-drawer-list-item-active{
        border-radius: 0 20px 20px 0;
        background-color:#B9D1FF ;
        color:#448AFF;
        }
        .mdui-drawer-list-item{
        border-radius: 0 20px 20px 0;
        }
        footer{
        border-radius: 10px 10px 0 0;
        }
        @keyframes toleft{
        from {margin-left: 64px;opacity: 0;}
        to {}
        }
        @keyframes toright{
        from {margin-right: 64px;opacity: 0;}
        to {}
        }
        .toleft{
        animation-name: toleft;
        animation-duration: 0.5s;
        }
        .toright{
        animation-name: toright;
        animation-duration: 0.5s;
        }
        .mdui-btn,.opacity{
        animation-name: opacity;
        animation-duration: 1s;
        }
		@keyframes opacity{
		from  {opacity: 0;}
		to {opacity: 1;}
		}
		.title{
		animation-name: title;
		animation-duration: 1s;
		}
		@keyframes title{
		from {font-size: 15px;}
		to {}
		}
        </style>
        <title>Delta's Website-Home</title> 
    </head> 
    <body class="mdui-theme-layout-auto mdui-theme-primary-blue mdui-theme-accent-blue mdui-drawer-body-left"> 
        <header class="mdui-appbar mdui-appbar-fixed mdui-appbar-inset">
        <div class="mdui-toolbar mdui-color-theme-accent">
        <a class="mdui-btn mdui-btn-icon mdui-ripple mdui-ripple-white" mdui-drawer="{target: '#drawer', swipe: true}">
        <i class="mdui-icon material-icons">menu</i>
        </a>
        <a class="mdui-typo-headline opacity" href="index.html">Delta's Homepage</a>
        <div class="mdui-toolbar-spacer"></div>
        <a id="switch-theme" class="mdui-btn mdui-btn-icon mdui-ripple mdui-ripple-white" mdui-tooltip="{content: 'Brightness'}" onclick="themecolor()">
        <i class="mdui-icon material-icons">brightness_medium</i>
        </a>
<script>
    if(localStorage.darkTheme)
        document.body.classList.add("mdui-theme-layout-dark");
    document.getElementById("switch-theme").addEventListener(
        "click",
        () => document.body.classList.toggle("mdui-theme-layout-dark") ?
            (localStorage.darkTheme = true) :
            (delete localStorage.darkTheme)
    );
</script>
        </div>
        </header>
        <div class="mdui-drawer" id="drawer">
        <img class="mdui-img-fluid" src="images/atri-2.jpg"/>
        <ul class="mdui-list" mdui-collapse="{accordion: true}">
        <a href="index.html" mdui-drawer-close>
        <li class="mdui-list-item mdui-ripple mdui-list-item-active mdui-drawer-list-item-active">
        <i class="mdui-list-item-icon mdui-icon material-icons mdui-text-color-theme-accent mdui-text-color-theme-icon">home</i>
        <div class="mdui-list-item-content">Home</div>
        </li>
        </a>
        <a href="music.html" mdui-drawer-close>
        <li class="mdui-list-item mdui-ripple mdui-drawer-list-item">
        <i class="mdui-list-item-icon mdui-icon material-icons mdui-text-color-theme-accent mdui-text-color-theme-icon">&#xe405;</i>
        <div class="mdui-list-item-content">Music</div>
        </li>
        </a>
        
        </div>
        </ul>
        </div>
        <br><br><br><br>
        <div class="mdui-card mdui-m-l-2 mdui-m-r-2 mdui-m-t-2 mdui-m-b-2 mdui-shadow-12">
            <div class="mdui-m-l-2 mdui-m-r-2 mdui-m-t-2 mdui-m-b-2">
            <h1 class="mdui-text-color-theme-accent mdui-text-color-theme-text title">Delta's Homepage</h1>
        <div class="mdui-text-center"> 
            <img src="images/hyp.jpg" class="mdui-shadow-8 mdui-img-fluid" style="border-radius: 10px;margin-left: auto;margin-right: auto;max-height: 96px;"> 
            <br>
            <h3 class="mdui-text-color-theme-accent mdui-text-color-theme-text">Welcome to Delta's Homepage!<br><br>Maker: SkyBlockFurries<br>Tools used: VSCode<br>Help from MDUI</h3> 
            </div>
            <div class="mdui-divider"></div><br> 
            <ul class="mdui-list">
            <a href="music.html">
            <li class="mdui-list-item mdui-ripple">
            <i class="mdui-icon material-icons mdui-list-item-avatar mdui-color-red">storage</i>
            <div class="mdui-list-item-content">
            	<div class="mdui-list-item-title">Music?</div>
               	<div class="mdui-list-item-text">Get Delta's playlist!</div>
            </div>
            </li>
            </a> 
            
            </ul>
        </div>
        </div>
        <br>
        <footer class="mdui-text-center mdui-color-theme-accent">
        <br>
        <a class="mdui-btn mdui-btn-icon mdui-ripple mdui-ripple-white" href="mailto:3321262302@qq.com" mdui-tooltip="{content: 'QQ Mail'}">
        <i class="mdui-icon material-icons">email</i>
        </a>

        <br><br>
        <div class="mdui-typo">
        <p><label>Theme: <a href="https://www.mdui.org/" class="mdui-color-yellow">MDUI</a></label></p>
        </div>
        <p style="font-size: 15px;font-weight: bold;">Copyright 2021 - SkyLine Studio (SBF)</p>
        <br><br>
        </footer>
    </body>
    <script>
        	function themecolor(){
    			if (localStorage.darkTheme){
                	document.body.classList.add('mdui-theme-accent-blue');
				}else{
    				document.body.classList.remove('mdui-theme-accent-blue');
				}
			}
      		var hour = new Date().getHours();
               if (hour >= 22 || hour < 7){
    				document.body.classList.remove('mdui-theme-accent-blue');
                	document.body.classList.add('mdui-theme-layout-dark');
				}
        </script>
</html>
